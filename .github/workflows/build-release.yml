name: Build & Release EXE

# Runs automatically whenever you push a tag like v1.0.1
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec

      - name: Rename EXE to include version
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist/RDX_CSBV_Extractor.exe" "dist/RDX_CSBV_Extractor_$tag.exe"

      - name: Publish GitHub Release with EXE attached
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RDX_CSBV_Extractor.exe
            dist/RDX_CSBV_Extractor_${{ github.ref_name }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
