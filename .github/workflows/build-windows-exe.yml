name: Build Windows EXE

# Jab bhi "v" se shuru hone wala tag push karoge (e.g. v1.0.0),
# ye workflow Windows .exe banayega aur GitHub Release me daal dega.
# Manual run ke liye "Run workflow" button bhi use kar sakte ho (Actions tab).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "RDx-CSB-Extractor" rdx_csb_app.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RDx-CSB-Extractor-windows
          path: dist/RDx-CSB-Extractor.exe

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RDx-CSB-Extractor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
